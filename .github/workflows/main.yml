name: Deploy to Remote Server

on:
  workflow_dispatch:
    inputs:
      branch_name:
        description: '请选择构建分支'
        required: true
        type: choice
        options:
          - dev
          - master
        default: dev
      deploy_to_cn_test:
        description: '部署到测试环境 (cn-test)'
        required: true
        type: boolean
        default: true
      deploy_to_cn_prod:
        description: '部署到生产环境 (cn-prod)'
        required: true
        type: boolean
        default: false
      deploy_to_global_prod:
        description: '部署到海外生产环境 (global-prod)'
        required: true
        type: boolean
        default: false
      action:
        description: '动作'
        required: true
        type: choice
        options:
          - '📦 部署业务 (artifacts)'
          - '🌐 部署 FRP (frp)'
          - '🔄 仅同步镜像到 github (sync_github)'
          - '📥 仅拉取分支、准备环境 (pull_prepare)'
        default: '📦 部署业务 (artifacts)'
      cache_strategy:
        description: '构建缓存策略'
        required: true
        type: choice
        options:
          - '⚡ 使用缓存构建 (use_cache)'
          - '🛠️ 清除业务缓存 (no_cache)'
          - '🧨 彻底全量构建 (full_reset)'
        default: '⚡ 使用缓存构建 (use_cache)'

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      deploy_matrix: ${{ steps.resolve_envs.outputs.deploy_matrix }}
      should_sync_github: ${{ steps.resolve_envs.outputs.should_sync_github }}
    steps:
      - name: resolve deploy environments
        id: resolve_envs
        shell: bash
        run: |
          matrix_items=()
          should_sync_github=false
          RAW_ACTION="${{ github.event.inputs.action }}"
          ACTION=$(echo "$RAW_ACTION" | grep -oP '\(\K[^\)]+' || true)
          if [ -z "$ACTION" ]; then
            ACTION="$RAW_ACTION"
          fi

          if [ "${{ github.event.inputs.deploy_to_cn_test }}" = "true" ]; then
            matrix_items+=("{\"environment\":\"test\"}")
          fi

          if [ "${{ github.event.inputs.deploy_to_cn_prod }}" = "true" ]; then
            matrix_items+=("{\"environment\":\"prod\"}")
          fi

          if [ "${{ github.event.inputs.deploy_to_global_prod }}" = "true" ]; then
            matrix_items+=("{\"environment\":\"prod_global\"}")
            should_sync_github=true
          fi

          if [ "$ACTION" = "sync_github" ]; then
            should_sync_github=true
          fi

          if [ ${#matrix_items[@]} -eq 0 ] && [ "$ACTION" != "sync_github" ]; then
            echo "请至少选择一个部署环境（cn-test、cn-prod 或 global-prod）"
            exit 1
          fi

          deploy_matrix="[$(IFS=,; echo "${matrix_items[*]}")]"
          echo "deploy_matrix=${deploy_matrix}" >> "$GITHUB_OUTPUT"
          echo "should_sync_github=${should_sync_github}" >> "$GITHUB_OUTPUT"

  sync_to_github:
    needs: prepare
    runs-on: ubuntu-latest
    environment: prod_global
    permissions:
      contents: write
    steps:
      - name: skip sync for non-global deploy
        if: needs.prepare.outputs.should_sync_github != 'true'
        run: echo "跳过 Gitee -> GitHub 同步"

      - name: mirror gitee repo to github
        if: needs.prepare.outputs.should_sync_github == 'true'
        shell: bash
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          GITEE_USERNAME: ${{ secrets.GITEE_USERNAME }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/gitee_sync_key
          chmod 600 ~/.ssh/gitee_sync_key

          ssh-keyscan github.com >> ~/.ssh/known_hosts

          # 使用 HTTPS 从 Gitee 拉取镜像，避免 SSH 22 端口连通性问题。
          rm -rf /tmp/egeek-international.git
          git clone --mirror "https://${GITEE_USERNAME}:${GITEE_TOKEN}@gitee.com/egeek-dev/egeek-international.git" /tmp/egeek-international.git
          cd /tmp/egeek-international.git
          git remote add github git@github.com:egeek-dev/egeek-international.git
          GIT_SSH_COMMAND="ssh -i ~/.ssh/gitee_sync_key -o StrictHostKeyChecking=yes" git push --force --prune github "refs/heads/*:refs/heads/*" "refs/tags/*:refs/tags/*"

  deploy:
    needs:
      - prepare
      - sync_to_github
    if: github.event.inputs.action != '🔄 仅同步镜像到 github (sync_github)'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.deploy_matrix) }}
    environment: ${{ matrix.environment }}
    env:
      REPO_PATH: '/usr/local/egeek/repo'
      ENC_KEY: ${{ secrets.ENC_KEY }}
      PROXIES_JSON: ${{ secrets.PROXIES_JSON }}
    steps:
      - name: executing remote ssh commands to develop
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: '60m'
          envs: ENC_KEY,PROXIES_JSON
          script: |
            cd /
            case "${{ matrix.environment }}" in
              "test")
                DEPLOY_ENV="cn"
                APP_ENV="test"
                DEPLOY_TO="cn-test"
                ;;
              "prod")
                DEPLOY_ENV="cn"
                APP_ENV="prod"
                DEPLOY_TO="cn-prod"
                ;;
              "prod_global")
                DEPLOY_ENV="global"
                APP_ENV="prod"
                DEPLOY_TO="global-prod"
                ;;
              *)
                echo "❌ 未知环境: ${{ matrix.environment }}"
                exit 1
                ;;
            esac

            chmod +x ${{ env.REPO_PATH }}/build-git-pull.sh
            ${{ env.REPO_PATH }}/build-git-pull.sh -branch_name ${{ github.event.inputs.branch_name }} -deploy-env ${DEPLOY_ENV}

            RAW_ACTION="${{ github.event.inputs.action }}"
            ACTION=$(echo "$RAW_ACTION" | grep -oP '\(\K[^\)]+' || true)
            if [ -z "$ACTION" ]; then
              ACTION="$RAW_ACTION"
            fi

            chmod +x ${{ env.REPO_PATH }}/build.sh
            BUILD_PARAMS="-deploy-env ${DEPLOY_ENV} -env ${APP_ENV}"

            if [ "$ACTION" = "pull_prepare" ]; then
              BUILD_PARAMS="${BUILD_PARAMS} --prepare-only"
            fi

            if [ "$ACTION" = "frp" ]; then
              chmod +x ${{ env.REPO_PATH }}/build-frp.sh

              FRP_PARAM=""
              FRP_EXTRA_PARAM=""
              if [ "$DEPLOY_TO" = "cn-prod" ]; then
                FRP_PARAM="--frps"
              elif [ "$DEPLOY_TO" = "cn-test" ]; then
                FRP_PARAM="--frpc"
                FRP_EXTRA_PARAM="--detach-up"
              else
                echo "ℹ️  当前环境不执行 frp 部署: $DEPLOY_TO"
                exit 0
              fi

              ${{ env.REPO_PATH }}/build-frp.sh ${FRP_PARAM} ${FRP_EXTRA_PARAM}
              exit 0
            fi

            # --- 缓存参数解析逻辑 ---
            RAW_STR="${{ github.event.inputs.cache_strategy }}"
            # 使用 grep 提取括号内的值 (use_cache / no_cache / full_reset)
            CACHE_VALUE=$(echo $RAW_STR | grep -oP '\(\K[^\)]+')

            CACHE_PARAMS=""
            case "$CACHE_VALUE" in
              "no_cache")
                BUILD_PARAMS="${BUILD_PARAMS} --no-cache"
                ;;
              "full_reset")
                BUILD_PARAMS="${BUILD_PARAMS} --no-cache --full-reset"
                ;;
              *)
                # 默认为 use_cache
                ;;
            esac

            ${{ env.REPO_PATH }}/build.sh ${BUILD_PARAMS}
