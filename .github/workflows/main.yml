name: Deploy to Remote Server

on:
  workflow_dispatch:
    inputs:
      branch_name:
        description: '请选择构建分支'
        required: true
        type: choice
        options:
          - dev
          - master
        default: dev
      deploy_test:
        description: '是否部署到测试环境 (test)'
        required: true
        type: boolean
        default: true
      deploy_prod:
        description: '是否部署到生产环境 (prod)'
        required: true
        type: boolean
        default: false
      deploy_target:
        description: '部署目标'
        required: true
        type: choice
        options:
          - '📦 部署业务 (artifacts)'
          - '🌐 部署 FRP (frp)'
          - '📥 仅拉取分支、准备环境 (pull_prepare)'
        default: '📦 部署业务 (artifacts)'
      cache_strategy:
        description: '构建缓存策略'
        required: true
        type: choice
        options:
          - '⚡ 使用缓存构建 (use_cache)'
          - '🛠️ 清除业务缓存 (no_cache)'
          - '🧨 彻底全量构建 (full_reset)'
        default: '⚡ 使用缓存构建 (use_cache)'

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      app_envs: ${{ steps.resolve_envs.outputs.app_envs }}
    steps:
      - name: resolve deploy environments
        id: resolve_envs
        shell: bash
        run: |
          envs=()

          if [ "${{ github.event.inputs.deploy_test }}" = "true" ]; then
            envs+=("\"test\"")
          fi

          if [ "${{ github.event.inputs.deploy_prod }}" = "true" ]; then
            envs+=("\"prod\"")
          fi

          if [ ${#envs[@]} -eq 0 ]; then
            echo "请至少选择一个部署环境（test 或 prod）"
            exit 1
          fi

          app_envs="[$(IFS=,; echo "${envs[*]}")]"
          echo "app_envs=${app_envs}" >> "$GITHUB_OUTPUT"

  deploy:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app_env: ${{ fromJson(needs.prepare.outputs.app_envs) }}
    environment: ${{ matrix.app_env }}
    env:
      REPO_PATH: '/usr/local/egeek/repo'
      ENV_JSON: ${{ secrets.ENV_JSON }}
      PROXIES_JSON: ${{ secrets.PROXIES_JSON }}
    steps:
      - name: executing remote ssh commands to develop
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: '60m'
          envs: ENV_JSON,PROXIES_JSON
          script: |
            cd /
            chmod +x ${{ env.REPO_PATH }}/build-git-pull.sh
            ${{ env.REPO_PATH }}/build-git-pull.sh -branch_name ${{ github.event.inputs.branch_name }}

            RAW_DEPLOY_TARGET="${{ github.event.inputs.deploy_target }}"
            DEPLOY_TARGET=$(echo "$RAW_DEPLOY_TARGET" | grep -oP '\(\K[^\)]+' || true)
            if [ -z "$DEPLOY_TARGET" ]; then
              DEPLOY_TARGET="$RAW_DEPLOY_TARGET"
            fi

            chmod +x ${{ env.REPO_PATH }}/build-prepare-env.sh
            ${{ env.REPO_PATH }}/build-prepare-env.sh -env ${{ matrix.app_env }}

            if [ "$DEPLOY_TARGET" = "pull_prepare" ]; then
              echo "✅ 分支拉取与环境准备完成，跳过部署步骤"
              exit 0
            fi

            if [ "$DEPLOY_TARGET" = "frp" ]; then
              chmod +x ${{ env.REPO_PATH }}/build-frp.sh

              FRP_PARAM=""
              FRP_EXTRA_PARAM=""
              if [ "${{ matrix.app_env }}" = "prod" ]; then
                FRP_PARAM="--frps"
              elif [ "${{ matrix.app_env }}" = "test" ]; then
                FRP_PARAM="--frpc"
                FRP_EXTRA_PARAM="--detach-up"
              else
                echo "ℹ️  当前环境不执行 frp 部署: ${{ matrix.app_env }}"
                exit 0
              fi

              if [ "$FRP_EXTRA_PARAM" = "--detach-up" ]; then
                echo "ℹ️  当前为异步启动模式（--detach-up）：CI 仅保证构建与任务投递成功。"
                echo "ℹ️  最终结果请以容器运行状态为准。"
              fi

              ${{ env.REPO_PATH }}/build-frp.sh ${FRP_PARAM} ${FRP_EXTRA_PARAM}
              exit 0
            fi

            chmod +x ${{ env.REPO_PATH }}/build.sh

            # --- 缓存参数解析逻辑 ---
            RAW_STR="${{ github.event.inputs.cache_strategy }}"
            # 使用 grep 提取括号内的值 (use_cache / no_cache / full_reset)
            CACHE_VALUE=$(echo $RAW_STR | grep -oP '\(\K[^\)]+')

            CACHE_PARAMS=""
            case "$CACHE_VALUE" in
              "no_cache")
                CACHE_PARAMS="--no-cache"
                ;;
              "full_reset")
                CACHE_PARAMS="--no-cache --full-reset"
                ;;
              *)
                CACHE_PARAMS="" # 默认为 use_cache
                ;;
            esac

            ${{ env.REPO_PATH }}/build.sh \
            -env ${{ matrix.app_env }} \
            ${CACHE_PARAMS}
