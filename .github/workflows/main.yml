name: Deploy to Remote Server

on:
  workflow_dispatch:
    inputs:
      branch_name:
        description: '请选择构建分支'
        required: true
        type: choice
        options:
          - dev
          - master
        default: dev
      app_env:
        description: '请选择要构建到的项目环境'
        required: true
        type: choice
        options:
          - test
          - prod
        default: test
      cache_strategy:
        description: '构建缓存策略'
        required: true
        type: choice
        options:
          - "⚡ 使用缓存构建 (use_cache)"
          - "🛠️ 清除业务缓存 (no_cache)"
          - "🧨 彻底全量构建 (full_reset)"
        default: "⚡ 使用缓存构建 (use_cache)"

jobs:
  deploy:
    runs-on: ubuntu-latest
    # 定义路径变量
    env:
      REPO_PATH: "/usr/local/wujiaying/repo"
      
    steps:
    - name: executing remote ssh commands to develop
      uses: appleboy/ssh-action@master
      with:
        host: ${{ github.event.inputs.app_env == 'prod' && secrets.PROD_SSH_HOST || secrets.TEST_SSH_HOST }}
        username: ${{ github.event.inputs.app_env == 'prod' && secrets.PROD_SSH_USERNAME || secrets.TEST_SSH_USERNAME }}
        key: ${{ github.event.inputs.app_env == 'prod' && secrets.PROD_SSH_KEY || secrets.TEST_SSH_KEY }}
        port: ${{ github.event.inputs.app_env == 'prod' && secrets.PROD_SSH_PORT || secrets.TEST_SSH_PORT || 22 }}
        command_timeout: "60m"
        script: |
          cd /
          chmod +x ${{ env.REPO_PATH }}/build-git-pull.sh
          ${{ env.REPO_PATH }}/build-git-pull.sh -branch_name ${{ github.event.inputs.branch_name }}
          
          chmod +x ${{ env.REPO_PATH }}/build.sh
          
          # --- 缓存参数解析逻辑 ---
          RAW_STR="${{ github.event.inputs.cache_strategy }}"
          # 使用 grep 提取括号内的值 (use_cache / no_cache / full_reset)
          CACHE_VALUE=$(echo $RAW_STR | grep -oP '\(\K[^\)]+')
          
          CACHE_PARAMS=""
          case "$CACHE_VALUE" in
            "no_cache")
              CACHE_PARAMS="--no-cache"
              ;;
            "full_reset")
              CACHE_PARAMS="--no-cache --full-reset"
              ;;
            *)
              CACHE_PARAMS="" # 默认为 use_cache
              ;;
          esac

          APP_MAILER_PASSWORD="${{ secrets.MAILER_PASSWORD }}" \
          APP_BDY_ACCESS_KEY="${{ secrets.BDY_ACCESS_KEY }}" \
          APP_BDY_SECRET_KEY="${{ secrets.BDY_SECRET_KEY }}" \
          APP_JDY_ACCESS_KEY="${{ secrets.JDY_ACCESS_KEY }}" \
          APP_JDY_SECRET_KEY="${{ secrets.JDY_SECRET_KEY }}" \
          APP_OSS_ACCESS_KEY_ID="${{ secrets.OSS_ACCESS_KEY_ID }}" \
          APP_OSS_ACCESS_KEY_SECRET="${{ secrets.OSS_ACCESS_KEY_SECRET }}" \
          APP_DEEPSEEK_API_SECRET_KEY="${{ secrets.DEEPSEEK_API_SECRET_KEY }}" \
          APP_SILICONFLOW_API_SECRET_KEY="${{ secrets.SILICONFLOW_API_SECRET_KEY }}" \
          APP_PYTHON_API_SECRET_KEY="${{ secrets.PYTHON_API_SECRET_KEY }}" \
          APP_PGSQL_PASSWORD="${{ github.event.inputs.app_env == 'prod' && secrets.PROD_PGSQL_PASSWORD || secrets.TEST_PGSQL_PASSWORD }}" \
          APP_PGSQL_PASSWORD_${{ github.event.inputs.app_env }}="${{ github.event.inputs.app_env == 'prod' && secrets.PROD_PGSQL_PASSWORD || secrets.TEST_PGSQL_PASSWORD }}" \
          APP_REDIS_PASSWORD="${{ github.event.inputs.app_env == 'prod' && secrets.PROD_REDIS_PASSWORD || secrets.TEST_REDIS_PASSWORD }}" \
          APP_REDIS_PASSWORD_${{ github.event.inputs.app_env }}="${{ github.event.inputs.app_env == 'prod' && secrets.PROD_REDIS_PASSWORD || secrets.TEST_REDIS_PASSWORD }}" \
          APP_JWT_SECRET_${{ github.event.inputs.app_env }}="${{ github.event.inputs.app_env == 'prod' && secrets.PROD_JWT_SECRET || secrets.TEST_JWT_SECRET }}" \
          APP_JWT_REFRESH_SECRET_${{ github.event.inputs.app_env }}="${{ github.event.inputs.app_env == 'prod' && secrets.PROD_JWT_REFRESH_SECRET || secrets.TEST_JWT_REFRESH_SECRET }}" \
          ${{ env.REPO_PATH }}/build.sh \
          -env ${{ github.event.inputs.app_env }} \
          ${CACHE_PARAMS}
