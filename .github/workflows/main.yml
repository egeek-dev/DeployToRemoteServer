name: Deploy to Remote Server

on:
  workflow_dispatch:
    inputs:
      branch_name:
        description: '请选择构建分支'
        required: true
        type: choice
        options:
          - dev
          - master
        default: dev
      app_env:
        description: '请选择要构建到的项目环境'
        required: true
        type: choice
        options:
          - test
          - prod
        default: test
      cache_strategy:
        description: '构建缓存策略'
        required: true
        type: choice
        options:
          - "⚡ 使用缓存构建 (use_cache)"
          - "🛠️ 清除业务缓存 (no_cache)"
          - "🧨 彻底全量构建 (full_reset)"
        default: "⚡ 使用缓存构建 (use_cache)"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.app_env }}
    env:
      REPO_PATH: "/usr/local/wujiaying/repo"
      ENV_JSON: ${{ secrets.ENV_JSON }}
    steps:
    - name: executing remote ssh commands to develop
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_KEY }}
        port: ${{ secrets.SSH_PORT || 22 }}
        command_timeout: "60m"
        envs: ENV_JSON
        script: |
          cd /
          chmod +x ${{ env.REPO_PATH }}/build-git-pull.sh
          ${{ env.REPO_PATH }}/build-git-pull.sh -branch_name ${{ github.event.inputs.branch_name }}
          
          chmod +x ${{ env.REPO_PATH }}/build.sh
          
          # --- 缓存参数解析逻辑 ---
          RAW_STR="${{ github.event.inputs.cache_strategy }}"
          # 使用 grep 提取括号内的值 (use_cache / no_cache / full_reset)
          CACHE_VALUE=$(echo $RAW_STR | grep -oP '\(\K[^\)]+')
          
          CACHE_PARAMS=""
          case "$CACHE_VALUE" in
            "no_cache")
              CACHE_PARAMS="--no-cache"
              ;;
            "full_reset")
              CACHE_PARAMS="--no-cache --full-reset"
              ;;
            *)
              CACHE_PARAMS="" # 默认为 use_cache
              ;;
          esac
          
          ${{ env.REPO_PATH }}/build.sh \
          -env ${{ github.event.inputs.app_env }} \
          ${CACHE_PARAMS}
